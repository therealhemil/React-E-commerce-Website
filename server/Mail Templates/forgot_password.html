<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Forgot Password</title>
</head>

<body style="margin: 0;padding: 0;background-color: #f5f5f5;font-family: Arial, sans-serif;">

    <div style="max-width: 600px;margin: 40px auto;background: white;border-radius: 12px;padding: 40px;">

        <h1 style="color: #222;margin-bottom: 20px;">
            Reset Your Password 🔐
        </h1>

        <p style="font-size: 16px;color: #555;line-height: 1.6;">
            Hello {{first_name}},
        </p>

        <p style="font-size: 16px;color: #555;line-height: 1.6;">
            We received a request to reset your password.
        </p>

        <div style="text-align: center;margin: 40px 0;">
            <a href="{{reset_password_link}}"
                style="background: #000;color: white;padding: 14px 28px;text-decoration: none;border-radius: 8px;display: inline-block;font-size: 16px; word-break: break-all;">
                Reset Password Link : {{reset_password_link}} 
            </a>

        </div>

        <p style="font-size: 14px;color: #777;line-height: 1.6;">
            If you did not request a password reset, please ignore this email.
        </p>

        <p style="margin-top: 40px;color: #999;font-size: 13px;">
            Photography Website Team
        </p>

    </div>

</body>

</html>
